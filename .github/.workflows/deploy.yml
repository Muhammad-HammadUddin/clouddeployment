name:deploy on ec2
on:
  push:
    branches:
      - main
    
jobs:
  deploy:
    runs-on: ubuntu-latest
  steps:
    - name : checkout code
      uses : actions/checkout@v6
    - name: deploy via ssh
      uses: appleboy/ssh-action@v1
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        key: ${{ secrets.KEY }}
        script |
          cd ~/clouddeployment
          
          
          git pull
          sudo docker compose down
          sudo docker compose up -d --build

